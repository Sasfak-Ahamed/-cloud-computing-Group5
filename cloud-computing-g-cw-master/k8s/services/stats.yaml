apiVersion: apps/v1
kind: Deployment
metadata:
  name: stats-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stats-service
  template:
    metadata:
      labels:
        app: stats-service
    spec:
      containers:
        - name: stats-service
          image: sasfak/techsalary-stats:latest
          ports:
            - containerPort: 5005
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: stats-service
  namespace: app
spec:
  selector:
    app: stats-service
  ports:
    - port: 5005
      targetPort: 5005
  type: ClusterIP