apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote-service
  template:
    metadata:
      labels:
        app: vote-service
    spec:
      containers:
        - name: vote-service
          image: sasfak/techsalary-vote:latest
          ports:
            - containerPort: 5003
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL
            - name: APPROVAL_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APPROVAL_THRESHOLD
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vote-service
  namespace: app
spec:
  selector:
    app: vote-service
  ports:
    - port: 5003
      targetPort: 5003
  type: ClusterIP