apiVersion: apps/v1
kind: Deployment
metadata:
  name: salary-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: salary-service
  template:
    metadata:
      labels:
        app: salary-service
    spec:
      containers:
        - name: salary-service
          image: sasfak/techsalary-salary:latest
          ports:
            - containerPort: 5002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: salary-service
  namespace: app
spec:
  selector:
    app: salary-service
  ports:
    - port: 5002
      targetPort: 5002
  type: ClusterIP